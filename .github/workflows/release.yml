name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sdist_file: ${{ steps.meta.outputs.sdist_file }}
      sdist_sha256: ${{ steps.meta.outputs.sdist_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build backend --outdir dist
          python -m twine check dist/*

      - name: Capture release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(awk -F'"' '/^version = /{print $2; exit}' backend/pyproject.toml)"
          if [ -z "${PYPROJECT_VERSION}" ]; then
            echo "Failed to read version from backend/pyproject.toml" >&2
            exit 1
          fi
          if [ "${VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "Tag version (${VERSION}) does not match pyproject version (${PYPROJECT_VERSION})" >&2
            exit 1
          fi

          SDIST_FILE="$(basename "$(ls dist/*.tar.gz | head -n1)")"
          SDIST_SHA256="$(sha256sum "dist/${SDIST_FILE}" | awk '{print $1}')"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sdist_file=${SDIST_FILE}" >> "${GITHUB_OUTPUT}"
          echo "sdist_sha256=${SDIST_SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish_pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI via token
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to PyPI via trusted publishing
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish_github_release:
    runs-on: ubuntu-latest
    needs:
      - build
      - publish_pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  update_homebrew_tap:
    runs-on: ubuntu-latest
    needs:
      - build
      - publish_pypi
    if: ${{ vars.HOMEBREW_TAP_REPO != '' && secrets.HOMEBREW_TAP_TOKEN != '' }}
    env:
      VERSION: ${{ needs.build.outputs.version }}
      SDIST_SHA256: ${{ needs.build.outputs.sdist_sha256 }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      HOMEBREW_HOMEPAGE: ${{ vars.HOMEBREW_HOMEPAGE }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone Homebrew tap
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap

      - name: Render formula
        run: |
          set -euo pipefail
          HOMEPAGE="${HOMEBREW_HOMEPAGE:-https://github.com/${GITHUB_REPOSITORY}}"
          sed \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{SHA256}}|${SDIST_SHA256}|g" \
            -e "s|{{HOMEPAGE}}|${HOMEPAGE}|g" \
            .github/homebrew/governai-ui.rb.tmpl > tap/Formula/governai-ui.rb

      - name: Commit and push formula update
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- Formula/governai-ui.rb)" ]; then
            echo "Formula unchanged"
            exit 0
          fi
          git add Formula/governai-ui.rb
          git commit -m "governai-ui ${VERSION}"
          DEFAULT_BRANCH="$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')"
          git push origin "HEAD:${DEFAULT_BRANCH}"
